<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>van.ali.7 - Générateur d'Images IA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .app-container {
    background: rgba(0, 0, 0, 0.85);
    border-radius: 25px;
    padding: 30px 20px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
  }
  .app-title {
    text-align: center;
    font-size: 2.2em;
    font-weight: bold;
    background: linear-gradient(90deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 25px;
    letter-spacing: 2px;
  }
  .input-field {
    width: 100%;
    padding: 15px 20px;
    border-radius: 50px;
    border: 2px solid #a78bfa;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 1em;
    outline: none;
    margin-bottom: 20px;
    transition: all 0.3s;
  }
  .input-field:focus {
    border-color: #60a5fa;
    box-shadow: 0 0 15px rgba(167, 139, 250, 0.5);
  }
  .input-field::placeholder { color: rgba(255,255,255,0.5); }
  .generate-btn {
    width: 100%;
    padding: 15px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(90deg, #a78bfa, #60a5fa);
    color: white;
    font-size: 1.1em;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.3s;
    margin-bottom: 20px;
  }
  .generate-btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(167,139,250,0.5); }
  .generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .image-container {
    width: 100%;
    min-height: 250px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.6);
    overflow: hidden;
    border: 2px dashed rgba(255,255,255,0.2);
  }
  .image-container img {
    width: 100%;
    border-radius: 15px;
    display: block;
  }
  .loader {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(167,139,250,0.3);
    border-top-color: #a78bfa;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .download-btn {
    width: 100%;
    padding: 12px;
    border-radius: 50px;
    border: 2px solid #60a5fa;
    background: transparent;
    color: #60a5fa;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
    margin-top: 15px;
    display: none;
    transition: all 0.3s;
  }
  .download-btn:hover { background: #60a5fa; color: white; }
  .model-select {
    width: 100%;
    padding: 12px 20px;
    border-radius: 50px;
    border: 2px solid #a78bfa;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 0.95em;
    outline: none;
    margin-bottom: 15px;
    appearance: none;
  }
  .model-select option { background: #1a1a2e; color: white; }
  .footer {
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-size: 0.8em;
    margin-top: 20px;
  }
</style>
</head>
<body>
<div class="app-container">
  <h1 class="app-title">van.ali.7</h1>
  
  <input type="text" class="input-field" id="promptInput" placeholder="✍️ Décrivez votre image...">
  
  <select class="model-select" id="modelSelect">
    <option value="flux">Flux (Recommandé)</option>
    <option value="turbo">Turbo (Rapide)</option>
    <option value="flux-realism">Flux Realism</option>
    <option value="flux-anime">Flux Anime</option>
    <option value="flux-3d">Flux 3D</option>
    <option value="any-dark">Any Dark</option>
  </select>
  
  <button class="generate-btn" id="generateBtn" onclick="generateImage()">
     Générer l'image
  </button>
  
  <div class="image-container" id="imageContainer">
    <div class="loader" id="loader"></div>
    <p id="placeholderText">🖼️ Votre image apparaîtra ici</p>
    <img id="generatedImage" style="display:none;" alt="Image générée">
  </div>
  
  <button class="download-btn" id="downloadBtn" onclick="downloadImage()">
    ️ Télécharger
  </button>
  
  <div class="footer">Powered by Pollinations AI • van.ali.7</div>
</div>

<script>
  let currentImageUrl = '';
  
  async function generateImage() {
    const prompt = document.getElementById('promptInput').value.trim();
    const model = document.getElementById('modelSelect').value;
    const btn = document.getElementById('generateBtn');
    const loader = document.getElementById('loader');
    const placeholder = document.getElementById('placeholderText');
    const img = document.getElementById('generatedImage');
    const downloadBtn = document.getElementById('downloadBtn');
    
    if (!prompt) {
      alert('Veuillez entrer une description !');
      return;
    }
    
    btn.disabled = true;
    btn.textContent = '⏳ Génération en cours...';
    loader.style.display = 'block';
    placeholder.style.display = 'none';
    img.style.display = 'none';
    downloadBtn.style.display = 'none';
    
    try {
      const seed = Math.floor(Math.random() * 1000000);
      const API_KEY = 'pk_2P6f3vb6dLmQovrf';

      const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?model=${model}&width=1024&height=1024&seed=${seed}&nologo=true&token=${API_KEY}`;      
      currentImageUrl = url;
      
      const response = await fetch(url);
      if (!response.ok) throw new Error('Erreur de génération');
      
      const blob = await response.blob();
      const objectUrl = URL.createObjectURL(blob);
      
      img.src = objectUrl;
      img.style.display = 'block';
      downloadBtn.style.display = 'block';
      
    } catch (error) {
      placeholder.style.display = 'block';
      placeholder.textContent = '❌ Erreur : ' + error.message;
    } finally {
      loader.style.display = 'none';
      btn.disabled = false;
      btn.textContent = '🎨 Générer l\'image';
    }
  }
  
  async function downloadImage() {
    if (!currentImageUrl) return;
    try {
      const response = await fetch(currentImageUrl);
      const blob = await response.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `van.ali.7_${Date.now()}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e) {
      alert('Erreur de téléchargement');
    }
  }
  
  document.getElementById('promptInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') generateImage();
  });
</script>
</body>
</html>
